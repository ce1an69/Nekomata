# config.toml — Nekomata 用户配置

[ai]
backend = "template"            # template | openai_compatible
model = ""
base_url = "https://api.openai.com/v1"
api_key = ""
timeout = 60.0
style = "mystical"              # mystical | warm | direct
fallback_to_template = true

[display]
animation = true
theme = "catppuccin"

[reversal]
probability = 0.5
