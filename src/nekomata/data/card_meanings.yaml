  meaning_upright: 流浪猫在寒风中瑟缩着身体，毛发凌乱，眼神里满是疲惫。身后那扇亮着灯的门一直在等它——物质的困境与孤独是真实的，但帮助也许就在转身之间。
  meaning_reversed: 有人推开了那扇门，温暖的灯光涌出来，流浪猫小心翼翼地踏进了门槛。困境中出现了转机，接受帮助不是耻辱而是勇气。
  keywords_upright_en:
  - hardship
  - loneliness
  - material scarcity
  keywords_reversed_en:
  - recovery
  - finding help
  - emerging from hardship
  meaning_upright_en: A stray cat shivers in the cold wind, coat matted and eyes heavy with exhaustion. Behind it, a door stands ajar with warm light pouring out, waiting for it to enter — material hardship and loneliness are real, but help may be only a turn away.
  meaning_reversed_en: Someone pushes that door open, warm light flooding out, and the stray cat steps cautiously across the threshold. A turning point appears in the midst of hardship, and accepting help is not a shame but an act of courage.
- id: pentacles_06
  name: Six of Pentacles
  name_zh: 星币六
  arcana: pentacles
  number: 6
