  meaning_upright_en: A family of cats has lived under the same warm roof for generations — the old teach the young, and the young tumble at the old cats' sides. What is passed down is not just territory but love — the deeper the family roots, the lusher the branches grow.
  meaning_reversed_en: A kitten and an elder cat quarrel fiercely over the best sleeping spot, tradition and new ideas clashing in a shower of sparks. Generational conflict is tearing at the family bonds that should hold tight.
