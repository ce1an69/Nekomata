  - vanity
  - disconnection
  meaning_upright_en: A cat strolls leisurely through a garden heavy with fruit, sunlight washing over its glossy coat, every step unhurried and graceful. Material abundance and spiritual independence complement each other beautifully — enjoy the beauty you have built with your own paws.
  meaning_reversed_en: The cat loses its way in the garden, so captivated by the beautiful flowers that it forgets the way home. Over-dependence on external pleasures or vanity is pulling you out of touch with your inner self.
