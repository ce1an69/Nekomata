  meaning_reversed: 猫在花园里迷了路，被美丽的花朵吸引了全部注意力，忘了回家的路。过度依赖外在的物质享受或虚荣正在让你与内在失去联系。
  keywords_upright_en:
  - abundance
  - independence
  - enjoyment
  keywords_reversed_en:
