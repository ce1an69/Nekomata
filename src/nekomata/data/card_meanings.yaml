  meaning_upright: 三只猫各就各位，一只推一只拉一只扶，配合默契，合力把柜子推倒。每只猫都贡献了自己独特的技能——团队合作让不可能变成了可能。
  meaning_reversed: 三只猫围着柜子各推各的方向，力气互相抵消，柜子纹丝不动。缺乏协调的合作不如单干，目标不一致只会白费力气。
  keywords_upright_en:
  - collaboration
  - skill
  - teamwork
  keywords_reversed_en:
  - lack of cooperation
  - poor quality
  - working alone
  meaning_upright_en: Three cats take their positions — one pushes, one pulls, one steadies — working in perfect coordination to topple the cabinet. Each cat contributes its own unique skill — teamwork turns the impossible into the possible.
  meaning_reversed_en: Three cats crowd around the cabinet pushing in different directions, their efforts canceling each other out, the cabinet not budging an inch. Uncoordinated teamwork is worse than working alone, and misaligned goals are just a waste of energy.
- id: pentacles_04
  name: Four of Pentacles
  name_zh: 星币四
  arcana: pentacles
  number: 4
  element: earth
  astrology: Taurus
  keywords_upright:
