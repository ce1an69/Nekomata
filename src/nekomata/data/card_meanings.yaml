  - diligence
  - steadfastness
  keywords_reversed_en:
  - laziness
  - unreliability
  - procrastination
  meaning_upright_en: A cat appears at the door every day right on time to welcome its human home, rain or shine. Reliability and diligence are not grand spectacles — doing every small thing with steady feet adds up, day by day, into the greatest accomplishment.
  meaning_reversed_en: The cat sleeps in its bed when it should be guarding the door, not even hearing its human's footsteps on the approach. Unreliability and laziness are eroding the trust others place in you.
- id: pentacles_13
  name: Queen of Pentacles
  name_zh: 星币王后
  arcana: pentacles
  number: 13
  element: earth
  astrology: Taurus
  keywords_upright:
  - 滋养
  - 丰盛
  - 关怀
  keywords_reversed:
  - 缺乏安全感
  - 自我忽视
  - 物质焦虑
  meaning_upright: 猫在柔软温暖的毯子上舒适地打盹，身旁摆着新鲜的水和满满一碗猫粮。物质的滋养与丰盛的关怀让它安心入眠——照顾好自己，才有余力温暖他人。
  meaning_reversed: 猫在空空的食盆前焦虑地来回踱步，叫声里带着不安。物质上的不安全感正在动摇你的根基，别忘了也该照顾一下自己的需求。
  keywords_upright_en:
  - nurturing
  - abundance
  - care
  keywords_reversed_en:
  - insecurity
  - self-neglect
  - material anxiety
  meaning_upright_en: A cat naps comfortably on a soft warm blanket, fresh water and a full bowl of kibble placed within easy reach. Material nourishment and abundant care let it drift off with peace of mind — tend to yourself first, so you have the warmth left to tend to others.
  meaning_reversed_en: A cat paces anxiously back and forth in front of an empty food bowl, meowing with unmistakable unease. Material insecurity is shaking your foundations — do not forget that your own needs deserve attention too.
- id: pentacles_14
  name: King of Pentacles
  name_zh: 星币国王
  arcana: pentacles
  number: 14
  element: earth
  astrology: Taurus
  keywords_upright:
  - 财富
  - 成功
  - 安全
  keywords_reversed:
  - 贪婪
  - 物质主义
  - 缺乏内在
  meaning_upright: 猫在自己的领地上悠然自得地巡视，每一寸领地都被打理得井井有条。物质上的成功与稳固的安全感是实实在在的——你的根基扎实，未来可期。
  meaning_reversed: 猫守着一屋子的囤积零食，眼睛还在盯着柜子上的新到货。过度的物质主义让占有代替了享受，内在的空虚是再多的囤积也填不满的。
  keywords_upright_en:
  - wealth
  - success
  - security
  keywords_reversed_en:
  - greed
  - materialism
  - inner emptiness
  meaning_upright_en: A cat surveys its territory at a leisurely pace, every inch kept in impeccable order. Material success and rock-solid security are real and tangible — your foundation is firm, and the future looks bright.
  meaning_reversed_en: The cat guards a house stuffed with hoarded treats, eyes still glued to the newest arrivals on the shelf. Excessive materialism has replaced enjoyment with possession, and no amount of hoarding can fill the emptiness inside.
