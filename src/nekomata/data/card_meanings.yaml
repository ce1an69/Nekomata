  - deception
  - wasted talent
  meaning_upright_en: A cat pushes objects off the table one by one with pinpoint precision, each swipe perfectly calculated. It turns will into action and everything on the table is its prop — you already possess every tool needed to achieve your goals.
  meaning_reversed_en: A cat tangles a ball of yarn into an impossible knot, and the more it struggles the tighter it becomes. Talent wasted in the wrong direction, or secretly used to manipulate others — true power is being squandered.
