- id: major_00
  name: The Fool
  name_zh: 愚者
  arcana: major
  number: 0
  element: air
  astrology: Uranus
  keywords_upright:
  - 新开始
  - 天真
  - 自由
  keywords_reversed:
  - 鲁莽
  - 冒失
  - 犹豫
  meaning_upright: 小猫在花园里追着蝴蝶奔跑，完全不在意脚边的悬崖。它相信自己的爪子能抓住一切——此刻的你正站在全新旅程的起点，带着纯真和勇气向前跃进吧。
  meaning_reversed: 猫咪在窗台上犹豫不决，既想跳下去又缩回了爪子。鲁莽的纵身一跃可能摔得很惨，但过度恐惧只会让你永远困在原地。
  keywords_upright_en:
  - new beginnings
  - innocence
  - freedom
  keywords_reversed_en:
  - recklessness
  - foolhardiness
  - hesitation
  meaning_upright_en: A kitten chases a butterfly through the garden, oblivious to the cliff's edge beneath its paws. It trusts its claws to catch everything — you stand at the threshold of a new journey, leap forward with pure courage and innocence.
  meaning_reversed_en: A cat hesitates on the windowsill, wanting to jump but pulling its paws back. A reckless leap could end badly, but excessive fear will only keep you stuck forever.
- id: major_01
  name: The Magician
  name_zh: 魔术师
