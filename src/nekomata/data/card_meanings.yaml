  meaning_reversed: 猫叼走了食盆里所有的食物，连碎屑都不留给同伴。自私让分享变成了奢侈，而过度施舍也可能让人失去自立的能力。
  keywords_upright_en:
  - generosity
  - sharing
  - giving
  keywords_reversed_en:
  - selfishness
  - debt
  - over-giving
  meaning_upright_en: A cat proudly carries its hard-caught prize to its human's feet, meowing with tail held high. Generous sharing and mutual aid are true virtues — the giver finds their own value in being needed.
  meaning_reversed_en: The cat swipes every last morsel from the food bowl, not leaving a single crumb for its companions. Selfishness turns sharing into a luxury, and over-giving can strip others of the ability to stand on their own.
- id: pentacles_07
