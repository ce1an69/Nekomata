  - 不可靠
  - 拖延
  meaning_upright: 猫每天准时出现在门口等候主人回家，风雨无阻。可靠与勤奋不是轰轰烈烈的壮举——脚踏实地把每一件小事做好，日积月累便是最大的成就。
  meaning_reversed: 猫在应该守门的时候睡在了猫窝里，连主人回来的脚步声都没听到。不可靠和懒惰正在侵蚀你在他人心中的信任。
  keywords_upright_en:
