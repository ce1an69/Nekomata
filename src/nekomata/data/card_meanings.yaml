  - laziness
  - wasted opportunity
  meaning_upright_en: A kitten crouches at the kitchen door, intently observing every step of its human opening a can, eyes focused and curious. A pragmatic learning spirit and curiosity about the material world — every skill you master opens another door of possibility.
  meaning_reversed_en: The kitten plays with the can's pull-tab and ignores the food inside, missing the real prize. Laziness and aimlessness are wasting the most precious opportunities for growth.
- id: pentacles_12
  name: Knight of Pentacles
  name_zh: 星币骑士
  arcana: pentacles
  number: 12
  element: earth
  astrology: Taurus
  keywords_upright:
