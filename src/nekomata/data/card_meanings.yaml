  - lack of inspiration
  - burnout
  meaning_upright_en: A cat concentrates on working a puzzle toy with its front paws over and over, each piece placed exactly where it belongs. Masterful skill comes from day-after-day focus — the spirit of craftsmanship is your most shining quality right now.
  meaning_reversed_en: The cat shoves the puzzle aside and stares blankly at the scattered pieces. Perfectionism-driven burnout has drained the passion for creation — maybe it is time to allow yourself to be less than perfect.
