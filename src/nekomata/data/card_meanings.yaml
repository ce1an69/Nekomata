  - 物质执念
  meaning_upright: 猫紧紧地用身体护住自己的零食堆，前爪环绕，后腿收拢，眼神警惕地扫视四周。对物质安全的需求与储蓄的智慧无可厚非——但别让保护变成了封闭。
  meaning_reversed: 猫藏了一屋子零食还在不停地囤，眼睛盯着每一颗干粮粒不肯分享。贪婪和过度的物质执念让拥有变成了被拥有。
  keywords_upright_en:
  - security
  - conservation
  - control
  keywords_reversed_en:
  - greed
  - unwillingness to share
  - material attachment
  meaning_upright_en: A cat hunches protectively over its pile of treats, front paws wrapped around the stash, hind legs tucked in, eyes darting warily in every direction. The need for material security and the wisdom of saving are perfectly fine — just do not let protection become a prison.
  meaning_reversed_en: The cat has hoarded treats all over the house and keeps stashing more, eyes glued to every single kibble, refusing to share a crumb. Greed and excessive material attachment mean that possessing has turned into being possessed.
- id: pentacles_05
  name: Five of Pentacles
