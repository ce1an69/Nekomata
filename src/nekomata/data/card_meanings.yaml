  meaning_reversed: 猫等了片刻就按捺不住跑走了，刚离开老鼠就从洞口探出了头。缺乏耐心的急躁让之前的等待全部白费，目光短浅将一无所获。
  keywords_upright_en:
  - investment
  - patience
  - long-term reward
  keywords_reversed_en:
  - impatience
  - poor investment
  - short-sightedness
  meaning_upright_en: A cat sits utterly motionless beside a mouse hole, ears swiveling slightly, whiskers trembling in the dim light, patiently waiting for that shape about to appear. Investment demands patience, and the long-term reward will not betray a single moment of the wait.
  meaning_reversed_en: The cat waits a few moments then cannot hold still and bounds away — the instant it leaves, a mouse pokes its head out of the hole. Impatience wastes all the waiting that came before, and short-sightedness yields nothing at all.
