<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nekomata</title>
<style>/*__THEME_VARS__*/</style>
<link rel="stylesheet" href="/static/base.css">
<link rel="stylesheet" href="/static/components.css">
<link rel="stylesheet" href="/static/screens.css">
<link rel="stylesheet" href="/static/slots.css">
<link rel="stylesheet" href="/static/animations.css">
</head>
<body>

<!-- Starfield background -->
<canvas id="stars-canvas" aria-hidden="true"></canvas>
<div id="fog-layer" aria-hidden="true"></div>

<div id="app">

  <div id="toast-container"></div>

  <!-- Setup Screen -->
  <section id="screen-setup" class="screen hidden">
    <div class="card-panel setup-panel">
      <h1 class="title" data-i18n="setup.title">Setup</h1>
      <p class="subtitle" data-i18n="setup.subtitle">Configure your API connection</p>
      <div class="ornament">─── ✦ ───</div>
      <div class="form-group">
        <label data-i18n="setup.field_api_url">API URL</label>
        <input type="text" id="setup-url" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
      </div>
      <div class="form-group">
        <label data-i18n="setup.field_api_key">API Key</label>
        <input type="password" id="setup-key" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label data-i18n="setup.field_model">Model</label>
        <input type="text" id="setup-model" placeholder="gpt-4o-mini">
      </div>
      <div class="form-group">
        <label data-i18n="setup.field_lang">Language</label>
        <select id="setup-lang" class="select-mauve">
          <option value="en" selected>English</option>
          <option value="zh">中文</option>
        </select>
      </div>
      <div id="setup-error" class="error-text hidden"></div>
      <button id="setup-save" class="btn btn-primary" aria-label="Save configuration" data-i18n="setup.save_label">Save</button>
      <div class="hint-bar" data-i18n="setup.hints">Enter next / save · Tab switch</div>
    </div>
  </section>

  <!-- Home Screen -->
  <section id="screen-home" class="screen hidden">
    <div class="home-shell">
      <div class="card-panel home-panel">
        <h1 class="title">Nekomata</h1>
        <div class="ornament">─── ✦ ───</div>
        <textarea id="home-input" placeholder="> ask your question..." autocomplete="off" rows="1" aria-label="Ask a divination question"></textarea>
        <div id="home-suggestions" class="suggestions hidden"></div>
        <div class="hint-bar">Enter confirm · / commands</div>
      </div>
    </div>
  </section>

  <!-- Spread Select Screen -->
  <section id="screen-spread-select" class="screen hidden">
    <div class="card-panel spread-panel">
      <div id="spread-question-bar" class="question-bar hidden"></div>
      <h2 class="title" data-i18n="spread_select.prompt">Choose a spread</h2>
      <div class="spread-layout">
        <div id="spread-buttons" class="spread-buttons"></div>
        <div id="spread-preview" class="spread-preview">
          <p class="subtext" data-i18n="spread_select.prompt">Choose a spread</p>
        </div>
      </div>
      <div class="hint-bar" data-i18n="spread_select.hints">Click to select a spread</div>
    </div>
  </section>

  <!-- Draw Screen -->
  <section id="screen-draw" class="screen hidden">
    <div id="draw-header" class="draw-header">
      <span id="draw-spread-name" class="accent"></span>
      <div id="draw-question" class="draw-question"></div>
    </div>
    <div class="ornament">─── ✦ ───</div>
    <div id="carousel-section" class="carousel-section">
      <div id="carousel-scene"></div>
    </div>
    <div class="main-area">
      <div id="spread-area" class="spread-area"></div>
      <div id="detail-panel" class="detail-panel hidden">
        <div id="detail-content"></div>
      </div>
    </div>
    <div id="interp-panel" class="interp-panel hidden">
      <div id="interp-content" class="interp-content">
        <div id="interp-loading" class="interp-loading hidden">
          <span id="interp-spinner"></span>
          <span id="interp-load-msg"></span>
        </div>
        <div id="interp-text"></div>
      </div>
    </div>
    <div class="draw-actions" id="draw-actions">
      <span id="draw-hint-text" class="hint-text"></span>
      <div class="action-buttons" id="draw-buttons"></div>
    </div>
  </section>

  <!-- Browser Screen -->
  <section id="screen-browser" class="screen hidden">
    <div class="browser-toolbar">
      <div id="filter-bar" class="filter-bar"></div>
      <div class="browser-actions">
        <button id="browser-reverse-btn" class="btn" data-i18n="card_detail.reversed">Reversed</button>
        <button id="browser-back-btn" class="btn">← Back</button>
      </div>
    </div>
    <div id="browser-count" class="subtext"></div>
    <div class="browser-area">
      <div id="card-list" class="card-list"></div>
      <div id="browser-detail" class="browser-detail">
        <p class="subtext" data-i18n="card_browser.select_placeholder">Select a card</p>
      </div>
    </div>
  </section>

</div>
<script type="module" src="/static/app.js"></script>
</body>
</html>
