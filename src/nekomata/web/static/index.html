<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nekomata</title>
<style>/*__THEME_VARS__*/</style>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">

  <!-- Setup Screen -->
  <section id="screen-setup" class="screen hidden">
    <div class="card-panel setup-panel">
      <h1 class="title">Setup</h1>
      <p class="subtitle">配置你的 API 连接</p>
      <div class="ornament">--- * ---</div>
      <div class="form-group">
        <label>API URL</label>
        <input type="text" id="setup-url" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="setup-key" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>Model</label>
        <input type="text" id="setup-model" placeholder="gpt-4o-mini">
      </div>
      <div id="setup-error" class="error-text hidden"></div>
      <button id="setup-save" class="btn btn-primary">Save</button>
      <div class="hint-bar">按 Enter 保存</div>
    </div>
  </section>

  <!-- Home Screen -->
  <section id="screen-home" class="screen hidden">
    <div class="home-shell">
      <div class="card-panel home-panel">
        <h1 class="title">Nekomata</h1>
        <div class="ornament">--- * ---</div>
        <input type="text" id="home-input" placeholder="> 输入你的问题..." autocomplete="off">
        <div id="home-suggestions" class="suggestions hidden"></div>
        <div class="hint-bar">Enter 确认 / 输入 / 查看命令</div>
      </div>
      <div class="home-cat-row" aria-hidden="true">
        <img src="/assets/cats/cartoon/狗肉_mystic_transparent_128.png" alt="">
        <img src="/assets/cats/cartoon/煤球_mystic_transparent_128.png" alt="">
        <img src="/assets/cats/cartoon/皮胖子_mystic_transparent_128.png" alt="">
        <img src="/assets/cats/cartoon/花花_mystic_transparent_128.png" alt="">
        <img src="/assets/cats/cartoon/金龙鱼_mystic_transparent_128.png" alt="">
        <img src="/assets/cats/cartoon/韦恩_mystic_transparent_128.png" alt="">
      </div>
    </div>
  </section>

  <!-- Spread Select Screen -->
  <section id="screen-spread-select" class="screen hidden">
    <div class="card-panel spread-panel">
      <div id="spread-question-bar" class="question-bar hidden"></div>
      <h2 class="title">Choose a Spread</h2>
      <div class="spread-layout">
        <div id="spread-buttons" class="spread-buttons"></div>
        <div id="spread-preview" class="spread-preview">
          <p class="subtext">选择一个牌阵</p>
        </div>
      </div>
      <div class="hint-bar">点击选择牌阵</div>
    </div>
  </section>

  <!-- Draw Screen -->
  <section id="screen-draw" class="screen hidden">
    <div id="draw-header" class="draw-header">
      <span id="draw-spread-name" class="accent"></span>
      <span id="draw-question" class="subtext"></span>
    </div>
    <div class="ornament">--- * ---</div>
    <div id="deck-section" class="deck-section">
      <div id="deck-grid" class="deck-grid"></div>
    </div>
    <div class="main-area">
      <div id="spread-area" class="spread-area"></div>
      <div id="detail-panel" class="detail-panel hidden">
        <div id="detail-content"></div>
      </div>
    </div>
    <div id="interp-panel" class="interp-panel hidden">
      <div id="interp-content" class="interp-content">
        <div id="interp-loading" class="interp-loading hidden">
          <span id="interp-spinner"></span>
          <span id="interp-load-msg"></span>
        </div>
        <div id="interp-text"></div>
      </div>
    </div>
    <div class="draw-actions" id="draw-actions">
      <span id="draw-hint-text" class="hint-text"></span>
      <div class="action-buttons" id="draw-buttons"></div>
    </div>
  </section>

  <!-- Browser Screen -->
  <section id="screen-browser" class="screen hidden">
    <div class="browser-toolbar">
      <div id="filter-bar" class="filter-bar"></div>
      <div class="browser-actions">
        <button id="browser-reverse-btn" class="btn" title="切换逆位">逆位</button>
        <button id="browser-back-btn" class="btn" title="返回">← 返回</button>
      </div>
    </div>
    <div id="browser-count" class="subtext"></div>
    <div class="browser-area">
      <div id="card-list" class="card-list"></div>
      <div id="browser-detail" class="browser-detail">
        <p class="subtext">选择一张牌查看详情</p>
      </div>
    </div>
  </section>

</div>
<script type="module" src="/static/app.js"></script>
</body>
</html>
